<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHTmayn v6.0 | Obsidian</title>
    <style>
        :root {
            --accent: #10b981;
            --bg: #0a0a0c;
            --panel: #16161e;
            --text: #e1e1e6;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
        }

        [data-theme="light"] {
            --accent: #059669;
            --bg: #f4f4f5;
            --panel: #ffffff;
            --text: #18181b;
            --border: rgba(0, 0, 0, 0.1);
            --glass: rgba(0, 0, 0, 0.02);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* БОКОВАЯ ПАНЕЛЬ */
        .sidebar {
            width: 64px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
            z-index: 100;
        }

        .side-item {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px;
            color: var(--text); opacity: 0.6;
        }

        .side-item:hover, .side-item.active {
            background: var(--accent);
            color: white;
            opacity: 1;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ТУЛБАР */
        .toolbar {
            height: 60px;
            background: var(--panel);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            border-bottom: 1px solid var(--border);
        }

        .address-bar {
            flex-grow: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 15px;
        }

        .address-bar input {
            background: none; border: none; outline: none; width: 100%;
            color: var(--text); font-size: 14px;
        }

        /* MINECRAFT AI BACKGROUND */
        #mc-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* КОНТЕНТ */
        .viewport {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .home-ui { text-align: center; }

        .logo-v6 {
            font-size: 80px;
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: -4px;
        }
        .logo-v6 span { color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 24px;
            width: 140px;
            cursor: pointer;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            background: rgba(16, 185, 129, 0.05);
        }

        .card i { font-size: 32px; display: block; margin-bottom: 10px; }

        /* ВНУТРЕННИЙ БРАУЗЕР */
        #web-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
            display: none;
            background: white;
        }

        /* ОКНО "SMART BRIDGE" */
        #bridge-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--panel);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--border);
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn-main {
            background: var(--accent);
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body onmousemove="updateParticles(event)">

    <aside class="sidebar">
        <div class="side-item active" onclick="goHome()">🏠</div>
        <div class="side-item" onclick="alert('История пуста')">📜</div>
        <div class="side-item" onclick="alert('Загрузок нет')">📥</div>
        <div style="flex-grow: 1;"></div>
        <div class="side-item" onclick="toggleTheme()">🌓</div>
    </aside>

    <main class="main-container">
        <header class="toolbar">
            <div class="address-bar">
                <span style="margin-right:10px">✨</span>
                <input type="text" id="main-url" placeholder="Введите запрос или URL..." onkeydown="handleEnter(event)">
            </div>
            <button class="side-item" style="background:var(--glass)" onclick="openExternal()">↗</button>
        </header>

        <div class="viewport">
            <canvas id="mc-canvas"></canvas>

            <div id="home-view" class="home-ui">
                <h1 class="logo-v6">sht<span>mayn</span></h1>
                <div class="grid" id="grid-container">
                    </div>
            </div>

            <div id="bridge-msg">
                <h2 style="color:var(--accent)">SHTmayn Bridge</h2>
                <p style="margin-top:15px; opacity:0.7">Этот сайт блокирует встраивание.<br>Мы подготовили его для открытия во внешнем окне.</p>
                <button class="btn-main" onclick="openExternal()">Запустить сайт</button>
            </div>

            <iframe id="web-view" src=""></iframe>
        </div>
    </main>

    <script>
        const sites = [
            { name: 'GitHub', icon: '🐙', url: 'https://github.com' },
            { name: 'YouTube', icon: '📺', url: 'https://youtube.com' },
            { name: 'Minecraft', icon: '⛏️', url: 'https://classic.minecraft.net' },
            { name: 'Bing AI', icon: '🤖', url: 'https://bing.com' }
        ];

        // Инициализация плиток
        function initGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = sites.map(s => `
                <div class="card" onclick="navigate('${s.url}')">
                    <i>${s.icon}</i>
                    <b>${s.name}</b>
                </div>
            `).join('');
        }

        // Логика навигации
        function handleEnter(e) {
            if (e.key === 'Enter') navigate(e.target.value);
        }

        function navigate(val) {
            let url = val.trim();
            if (!url) return;

            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.bing.com/search?q=' + encodeURIComponent(url);
            } else {
                if (!url.startsWith('http')) url = 'https://' + url;
            }

            document.getElementById('main-url').value = url;
            document.getElementById('home-view').style.display = 'none';
            
            const blocked = ['github.com', 'google', 'vk.com', 'youtube.com'];
            const isBlocked = blocked.some(b => url.toLowerCase().includes(b));

            if (isBlocked) {
                document.getElementById('web-view').style.display = 'none';
                document.getElementById('bridge-msg').style.display = 'block';
            } else {
                document.getElementById('bridge-msg').style.display = 'none';
                document.getElementById('web-view').style.display = 'block';
                document.getElementById('web-view').src = url;
            }
        }

        function goHome() {
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('web-view').style.display = 'none';
            document.getElementById('bridge-msg').style.display = 'none';
            document.getElementById('main-url').value = '';
        }

        function openExternal() {
            window.open(document.getElementById('main-url').value || 'https://github.com', '_blank');
        }

        function toggleTheme() {
            const t = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', t === 'dark' ? 'light' : 'dark');
        }

        // MINECRAFT AI CANVAS PARTICLES
        const canvas = document.getElementById('mc-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 20 + 10,
                    speed: Math.random() * 0.5 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = '#10b981';
            particles.forEach(p => {
                ctx.globalAlpha = 0.1;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                p.y -= p.speed;
                if(p.y < -20) p.y = canvas.height + 20;
            });
            requestAnimationFrame(drawParticles);
        }

        function updateParticles(e) {
            // Эффект реакции на мышь можно добавить сюда
        }

        window.onresize = initCanvas;
        initCanvas();
        drawParticles();
        initGrid();
    </script>
</body>
</html>
